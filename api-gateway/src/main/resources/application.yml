server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/users/**,/auth/**
        - id: vehicle-service
          uri: http://vehicle-service:8082
          predicates:
            - Path=/vehicles/**
        - id: rental-service
          uri: http://rental-service:8083
          predicates:
            - Path=/rentals/**
