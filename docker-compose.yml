services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  user-db:
    image: postgres:16
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]

  vehicle-db:
    image: postgres:16
    environment:
      POSTGRES_DB: vehicledb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5434:5432"]

  listing-db:
    image: postgres:16
    environment:
      POSTGRES_DB: listingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5435:5432"]

  rental-db:
    image: postgres:16
    environment:
      POSTGRES_DB: rentaldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5436:5432"]

  user-service:
    build: { context: ./user-service }
    depends_on: [user-db]
    environment:
      DB_URL: jdbc:postgresql://user-db:5432/userdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports: ["8081:8081"]

  vehicle-service:
    build: { context: ./vehicle-service }
    depends_on: [vehicle-db]
    environment:
      DB_URL: jdbc:postgresql://vehicle-db:5432/vehicledb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports: ["8082:8082"]

  listing-service:
    build: { context: ./listing-service }
    depends_on: [listing-db, vehicle-service, kafka]
    environment:
      DB_URL: jdbc:postgresql://listing-db:5432/listingdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      VEHICLE_SERVICE_URL: http://vehicle-service:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: VGhpc0lzQVN0cm9uZ0RldmVsb3BtZW50S2V5VGhpc0lzQVN0cm9uZ0RldmVsb3BtZW50S2V5
    ports: ["8084:8084"]

  rental-service:
    build: { context: ./rental-service }
    depends_on: [rental-db, user-service, vehicle-service, kafka]
    environment:
      DB_URL: jdbc:postgresql://rental-db:5432/rentaldb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      USER_SERVICE_URL: http://user-service:8081
      VEHICLE_SERVICE_URL: http://vehicle-service:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports: ["8083:8083"]
