services:
  user-db:
    image: postgres:16
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  vehicle-db:
    image: postgres:16
    environment:
      POSTGRES_DB: vehicledb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rental-db:
    image: postgres:16
    environment:
      POSTGRES_DB: rentaldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ./user-service
    environment:
      DB_URL: jdbc:postgresql://user-db:5432/userdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      user-db:
        condition: service_healthy
    ports:
      - "8081:8081"

  vehicle-service:
    build:
      context: ./vehicle-service
    environment:
      DB_URL: jdbc:postgresql://vehicle-db:5432/vehicledb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      vehicle-db:
        condition: service_healthy
    ports:
      - "8082:8082"

  rental-service:
    build:
      context: ./rental-service
    environment:
      DB_URL: jdbc:postgresql://rental-db:5432/rentaldb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      USER_SERVICE_URL: http://user-service:8081
      VEHICLE_SERVICE_URL: http://vehicle-service:8082
    depends_on:
      rental-db:
        condition: service_healthy
      user-service:
        condition: service_started
      vehicle-service:
        condition: service_started
    ports:
      - "8083:8083"
