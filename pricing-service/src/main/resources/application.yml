server:
  port: 8085

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pricingdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  application:
    name: pricing-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
